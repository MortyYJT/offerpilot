services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offerpilot
      POSTGRES_USER: offerpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-offerpilot-local}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offerpilot -d offerpilot"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  model-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        ollama show "$$OLLAMA_MODEL" >/dev/null 2>&1 && exit 0;
        attempt=0;
        until ollama pull "$$OLLAMA_MODEL"; do
          attempt=$$((attempt + 1));
          if [ "$$attempt" -ge 5 ]; then
            echo "Model download unavailable; API will use its deterministic fallback.";
            exit 0;
          fi;
          sleep 5;
        done
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://offerpilot:${POSTGRES_PASSWORD:-offerpilot-local}@postgres:5432/offerpilot
      LLM_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:0.5b
      SESSION_TTL_HOURS: 168
      CORS_ORIGINS: http://localhost:8080
      APP_ENV: development
      APP_URL: http://localhost:8080
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@offerpilot.local}
      AUTH_RATE_LIMIT_PER_MINUTE: 20
      RATE_LIMIT_PER_MINUTE: 120
    depends_on:
      postgres:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/readiness')"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  web:
    build: .
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: caddy:2-alpine
    ports:
      - "${PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  caddy_data:
  caddy_config:
