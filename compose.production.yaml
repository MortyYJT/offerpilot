services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}

  api:
    environment:
      DATABASE_URL: postgresql://offerpilot:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/offerpilot
      APP_ENV: production
      APP_URL: https://${DOMAIN:?Set DOMAIN}
      CORS_ORIGINS: https://${DOMAIN:?Set DOMAIN}
      ADMIN_EMAILS: ${ADMIN_EMAILS:?Set ADMIN_EMAILS}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?Set DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      ADVISOR_DAILY_LIMIT: ${ADVISOR_DAILY_LIMIT:-30}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:?Set SMTP_FROM}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      APP_RELEASE: ${APP_RELEASE:-offerpilot-api@0.4.0}

  gateway:
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN}

  backup:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_USER: offerpilot
      DB_NAME: offerpilot
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - postgres_backups:/backups
      - ./deploy/backup.sh:/usr/local/bin/offerpilot-backup:ro
    command: ["/bin/sh", "/usr/local/bin/offerpilot-backup"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "find /backups -type f -name 'offerpilot-*.dump' -mmin -1500 | grep -q ."]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 2m
    restart: unless-stopped

volumes:
  postgres_backups:
