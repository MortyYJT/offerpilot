name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
      - run: pnpm run lint
      - run: pnpm run build:next
      - run: pnpm test

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: offerpilot_test
          POSTGRES_USER: offerpilot
          POSTGRES_PASSWORD: offerpilot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U offerpilot -d offerpilot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt
      - run: python -m pip install --upgrade pip==26.1.2
      - run: pip install -r requirements-dev.txt
      - run: pip-audit --local
      - run: pytest -q
      - run: PYTHONPATH=. python evals/run_eval.py
      - run: DATABASE_URL=postgresql://offerpilot:offerpilot_test@localhost:5432/offerpilot_test alembic upgrade head
      - run: DATABASE_URL=postgresql://offerpilot:offerpilot_test@localhost:5432/offerpilot_test pytest -q tests/test_postgres_store.py
