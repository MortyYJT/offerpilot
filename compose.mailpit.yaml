services:
  mailpit:
    image: axllent/mailpit:v1.30.0
    ports:
      - "127.0.0.1:${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_LABEL: OfferPilot local email
      MP_MAX_MESSAGES: 200
      MP_MAX_AGE: 2d
    restart: unless-stopped

  api:
    environment:
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: OfferPilot <no-reply@offerpilot.local>
      SMTP_USE_TLS: "false"
    depends_on:
      mailpit:
        condition: service_healthy
